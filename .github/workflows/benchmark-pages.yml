name: Benchmark Pages

on:
  workflow_run:
    workflows:
      - Benchmark
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - .github/workflows/benchmark-pages.yml
      - benchmarks/site/**
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Run the JavaScript actions on Node 24 (they ship Node 20, deprecated by GitHub).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: benchmark-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build benchmark dashboard
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download retained benchmark artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .benchmark-artifacts

          gh run list \
            --workflow benchmark.yml \
            --branch main \
            --status success \
            --limit 100 \
            --json databaseId,headSha,headBranch,createdAt,displayTitle,event,url,workflowName,number \
            > .benchmark-artifacts/runs.json

          node - <<'NODE' > .benchmark-artifacts/run-ids.txt
          const fs = require("fs");
          const runs = JSON.parse(fs.readFileSync(".benchmark-artifacts/runs.json", "utf8"));
          for (const run of runs) {
            if (run.databaseId) console.log(run.databaseId);
          }
          NODE

          while IFS= read -r run_id; do
            [[ -z "${run_id}" ]] && continue
            echo "Downloading benchmark artifacts for run ${run_id}"
            gh run download "${run_id}" \
              --pattern "benchmark-report-*" \
              --dir ".benchmark-artifacts/run-${run_id}" || true
          done < .benchmark-artifacts/run-ids.txt

      - name: Build static benchmark site
        run: |
          node benchmarks/site/build.js site \
            --artifacts .benchmark-artifacts \
            --site benchmarks/site \
            --out public

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy benchmark dashboard
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
